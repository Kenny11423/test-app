<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px; 
            background-color: transparent;
            color: #333;
        }
        .chart-container { position: relative; height:40vh; width:100%; margin-bottom: 30px; }
        h2 { color: #007bff; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Chế độ tối (Dark Mode) - Sẽ được Python kích hoạt */
        body.dark-mode { color: #f8f9fa; }
        body.dark-mode h2 { color: #0d6efd; }
    </style>
</head>
<body>
    <h2>📊 BIỂU ĐỒ PHÂN PHỐI ĐIỂM SỐ</h2>
    <div class="chart-container">
        <canvas id="scoreChart"></canvas>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        let myChart = null;

        function updateChart(labels, data) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            
            // Nếu biểu đồ đã tồn tại, hãy xóa nó đi để vẽ lại
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels, // Tên học sinh hoặc ngày thi
                    datasets: [{
                        label: 'Tỷ lệ điểm (%)',
                        data: data,
                        backgroundColor: 'rgba(0, 123, 255, 0.6)',
                        borderColor: 'rgba(0, 123, 255, 1)',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100, ticks: { color: getTextColor() } },
                        x: { ticks: { color: getTextColor() } }
                    },
                    plugins: {
                        legend: { labels: { color: getTextColor() } }
                    }
                }
            });
        }

        function getTextColor() {
            return document.body.classList.contains('dark-mode') ? '#f8f9fa' : '#333';
        }

        // Cầu nối với Python
        new QWebChannel(qt.webChannelTransport, function (channel) {
            window.backend = channel.objects.backend;
            console.log("Cầu nối Python-JS đã sẵn sàng!");
        });

        function setTheme(mode) {
            if (mode === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            if (myChart) updateChart(myChart.data.labels, myChart.data.datasets[0].data);
        }
    </script>
</body>
</html>
